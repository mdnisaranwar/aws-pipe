
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Product Cards</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f3f6;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.product-card{
background:#fff;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.product-card h3{
margin:15px 0;
}

.price{
font-size:22px;
font-weight:bold;
color:green;
}

.rating{
margin:10px 0;
color:#ff9800;
}

button{
width:100%;
padding:10px;
border:none;
background:#2874f0;
color:white;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0d5bd8;
}

</style>
</head>
<body>

<h1>My E-Commerce Store</h1>

<div class="products">

<div class="product-card">
<img src="https://via.placeholder.com/300x220">
<h3>Apple iPhone 15</h3>
<p class="price">₹79,999</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button>Add To Cart</button>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/300x220">
<h3>Samsung Galaxy S24</h3>
<p class="price">₹69,999</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button>Add To Cart</button>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/300x220">
<h3>Dell Laptop</h3>
<p class="price">₹55,000</p>
<p class="rating">⭐⭐⭐⭐</p>
<button>Add To Cart</button>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/300x220">
<h3>Boat Headphones</h3>
<p class="price">₹2,999</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button>Add To Cart</button>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/300x220">
<h3>Smart Watch</h3>
<p class="price">₹4,999</p>
<p class="rating">⭐⭐⭐⭐</p>
<button>Add To Cart</button>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/300x220">
<h3>Nike Shoes</h3>
<p class="price">₹3,999</p>
<p class="rating">⭐⭐⭐⭐⭐</p>
<button>Add To Cart</button>
</div>

</div>

</body>
</html>
