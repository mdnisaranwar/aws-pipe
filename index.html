<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:black;
    color:white;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.7),
    rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600');
    background-size:cover;
    background-position:center;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.logo{
    color:red;
    font-size:40px;
    font-weight:bold;
}

.signin{
    background:red;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.content{
    text-align:center;
    margin-top:150px;
}

.content h1{
    font-size:60px;
}

.content h3{
    margin:20px 0;
}

.email-box{
    margin-top:20px;
}

.email-box input{
    width:350px;
    padding:15px;
    border:none;
}

.email-box button{
    padding:15px 25px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

.movies{
    padding:40px;
}

.row{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

.card{
    min-width:250px;
    height:150px;
    background:#222;
    border-radius:8px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.08);
}

footer{
    text-align:center;
    padding:20px;
    background:#111;
}
</style>
</head>

<body>

<div class="hero">

<header>
<div class="logo">NETFLIX</div>
<button class="signin">Sign In</button>
</header>

<div class="content">
<h1>Unlimited Movies, TV Shows and More</h1>
<h3>Watch anywhere. Cancel anytime.</h3>

<div class="email-box">
<input type="email" placeholder="Enter Email">
<button>Get Started</button>
</div>
</div>

</div>

<section class="movies">
<h2>Trending Now</h2>

<div class="row">

<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>

</div>
</section>

<footer>
<p>Netflix Clone Project © 2026</p>
</footer>

</body>
</html>
